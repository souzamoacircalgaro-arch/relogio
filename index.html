<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relógio Ultra-Fluido Pro</title>
  <style>
    @import url("https://googleapis.com");

    :root {
      --bg-color: #050505;
      --accent-color: #29ff08;
      --text-main: #ffffff;
      --text-dim: rgba(255, 255, 255, 0.5);
      --clock-size: 360px;
    }

    body {
      margin: 0;
      display: grid;
      place-items: center;
      height: 100vh;
      background: var(--bg-color);
      color: var(--text-main);
      font-family: "Comfortaa", sans-serif;
      overflow: hidden;
    }

    .clock {
      width: var(--clock-size);
      height: var(--clock-size);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Container de rotação genérico */
    .rotor {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      transition: transform 0.1s linear; /* Suaviza pequenos ajustes */
      will-change: transform;
    }

    .seconds { --dial-size: calc((var(--clock-size) / 2) - 8px); z-index: 1; }
    .minutes { --dial-size: calc((var(--clock-size) / 2) - 65px); z-index: 2; }

    .spike {
      position: absolute;
      width: 8px;
      height: 1px;
      background: var(--text-dim);
      inset: 0;
      margin: auto;
      transform: rotate(var(--rotate)) translateX(var(--dail-size));
    }

    /* Marcas de 5 em 5 minutos */
    .spike[data-i$="0"], .spike[data-i$="5"] {
      background: var(--text-main);
      width: 12px;
    }

    .spike::after {
      content: attr(data-i);
      position: absolute;
      right: 22px;
      top: -10px;
      font-size: 14px;
      /* O JS vai atualizar o --inverse-rotate para manter o texto reto */
      transform: rotate(var(--inverse-rotate)); 
    }

    .hour-center {
      font-size: 80px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -4px;
    }

    .minute-focus {
      position: absolute;
      right: 20%;
      font-size: 38px;
      font-weight: 900;
      background: var(--bg-color);
      padding: 0 10px;
      z-index: 10;
    }

    /* Moldura de seleção (Pointer) */
    .minute-focus::before {
      content: "";
      position: absolute;
      border: 3px solid var(--accent-color);
      border-right: none;
      height: 55px;
      width: 130px;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      border-radius: 40px 0 0 40px;
      pointer-events: none;
      box-shadow: -4px 0 15px rgba(41, 255, 8, 0.2);
    }
  </style>
</head>
<body>

  <main class="clock" aria-label="Relógio Digital Analógico">
    <div class="rotor seconds"></div>
    <div class="rotor minutes"></div>
    <div class="minute-focus">00</div>
    <div class="hour-center">00</div>
  </main>

  <script>
    const secRotor = document.querySelector('.seconds');
    const minRotor = document.querySelector('.minutes');
    const hourDisp = document.querySelector('.hour-center');
    const minDisp = document.querySelector('.minute-focus');

    // Inicialização do DOM otimizada (Fragment)
    function createSpikes(container) {
      const fragment = document.createDocumentFragment();
      for (let i = 0; i < 60; i++) {
        const spike = document.createElement('i');
        spike.className = 'spike';
        spike.style.setProperty('--rotate', `${i * 6}deg`);
        if (i % 5 === 0) spike.setAttribute('data-i', i.toString().padStart(2, '0'));
        fragment.appendChild(spike);
      }
      container.appendChild(fragment);
    }

    createSpikes(secRotor);
    createSpikes(minRotor);

    function update() {
      const now = new Date();
      const ms = now.getMilliseconds();
      const s = now.getSeconds();
      const m = now.getMinutes();
      const h = now.getHours();

      // Rotação contínua (estilo relógio automático)
      // Graus = (unidade atual * 6) + (fração da unidade seguinte para suavizar)
      const sDeg = (s * 6) + (ms * 0.006);
      const mDeg = (m * 6) + (s * 0.1); 

      // Aplicamos a rotação negativa no rotor (para os números virem até o marcador)
      secRotor.style.transform = `rotate(-${sDeg}deg)`;
      minRotor.style.transform = `rotate(-${mDeg}deg)`;

      // Atualiza rotação inversa dos números para ficarem sempre em pé
      document.querySelectorAll('.spike').forEach(spike => {
          const parentRotation = spike.parentElement.classList.contains('seconds') ? sDeg : mDeg;
          const ownRotation = parseFloat(spike.style.getPropertyValue('--rotate'));
          spike.style.setProperty('--inverse-rotate', `${parentRotation - ownRotation}deg`);
      });

      // Textos fixos
      hourDisp.textContent = h.toString().padStart(2, '0');
      minDisp.textContent = m.toString().padStart(2, '0');

      requestAnimationFrame(update);
    }

    // Inicia o loop de alta performance
    requestAnimationFrame(update);
  </script>
</body>
</html>
