<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relógio Moderno | Florianópolis</title>
  <style>
    @import url("https://googleapis.com");

    body {
      margin: 0; padding: 0;
      display: grid; place-items: center;
      height: 100vh; width: 100vw;
      overflow: hidden;
      background: black; color: white;
      font-family: "Comfortaa", sans-serif;
    }

    .clock {
      --clock-size: 360px;
      width: var(--clock-size);
      height: var(--clock-size);
      position: relative;
    }

    .seconds, .minutes {
      position: absolute; inset: 0;
      transition: transform 0.2s ease-out;
      will-change: transform;
    }

    .seconds { --dail-size: calc((var(--clock-size) / 2) - 8px); font-weight: 800; font-size: 16px; }
    .minutes { --dail-size: calc((var(--clock-size) / 2) - 65px); font-size: 16px; }

    .spike {
      z-index: 5; position: absolute;
      width: 8px; height: 1px;
      background: #fff9; transform-origin: 50%;
      inset: 0; margin: auto;
      transform: rotate(var(--rotate)) translateX(var(--dail-size));
    }

    .spike:nth-child(5n + 1) { box-shadow: -7px 0 #fff9; }

    .spike:nth-child(5n + 1):after {
      content: attr(data-i);
      position: absolute; right: 22px; top: -10px;
      transform: rotate(calc(var(--current-rotate) - var(--rotate)));
    }

    .hour {
      font-size: 80px; font-weight: 900;
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
    }

    .minute-focus {
      z-index: 10; font-size: 36px; font-weight: 900;
      position: absolute; background: black;
      right: calc(var(--clock-size) / 4.5); top: 50%;
      transform: translateY(-50%); padding: 0 5px;
    }

    .minute-focus:after {
      content: ""; position: absolute;
      border: 2px solid #29ff08; border-right: none;
      height: 50px; width: calc(var(--clock-size) / 2.75);
      left: -10px; top: 50%;
      border-radius: 40px 0 0 40px;
      transform: translateY(-50%);
    }

    .weather {
      position: absolute; bottom: -80px;
      left: 50%; transform: translateX(-50%);
      text-align: center; width: 300px;
    }

    #temp { display: block; font-size: 26px; font-weight: 700; color: #29ff08; }
    #desc { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; }
  </style>
</head>
<body>

  <main class="clock">
    <div class="seconds"></div>
    <div class="minutes"></div>
    <div class="minute-focus">00</div>
    <div class="hour">00</div>

    <div class="weather">
      <span id="temp">--°C</span>
      <span id="desc">Sincronizando clima...</span>
    </div>
  </main>

  <script>
    const secondsEl = document.querySelector('.seconds');
    const minutesEl = document.querySelector('.minutes');
    const minuteText = document.querySelector('.minute-focus');
    const hourText = document.querySelector('.hour');

    const API_KEY = "b2149d654a7186c9e90a4d102310f688"; 
    const CITY = "Florianopolis";

    function initClock() {
      for (let s = 0; s < 60; s++) {
        const val = s.toString().padStart(2, '0');
        const deg = s * 6;
        const sSpike = document.createElement('i');
        const mSpike = document.createElement('i');
        sSpike.className = mSpike.className = 'spike';
        sSpike.style.setProperty('--rotate', `${deg}deg`);
        mSpike.style.setProperty('--rotate', `${deg}deg`);
        sSpike.setAttribute('data-i', val);
        mSpike.setAttribute('data-i', val);
        secondsEl.append(sSpike);
        minutesEl.append(mSpike);
      }
    }

    function updateTime() {
      const now = new Date();
      const s = now.getSeconds(), m = now.getMinutes(), h = now.getHours();
      const sDeg = s * 6, mDeg = m * 6;

      secondsEl.style.transform = `rotate(-${sDeg}deg)`;
      minutesEl.style.transform = `rotate(-${mDeg}deg)`;
      secondsEl.style.setProperty('--current-rotate', `${sDeg}deg`);
      minutesEl.style.setProperty('--current-rotate', `${mDeg}deg`);

      hourText.textContent = h.toString().padStart(2, '0');
      minuteText.textContent = m.toString().padStart(2, '0');
    }

    async function updateWeather() {
      try {
        // Chamada de API conforme o padrão do OpenWeather
        const url = `https://openweathermap.org{CITY}&units=metric&lang=pt_br&APPID=${API_KEY}`;
        const res = await fetch(url);
        
        if (!res.ok) throw new Error();
        
        const data = await res.json();
        
        document.getElementById('temp').textContent = `${Math.round(data.main.temp)}°C`;
        document.getElementById('desc').textContent = data.weather[0].description;
        
      } catch (err) {
        // Se a chave ainda não estiver ativa, aparecerá esta mensagem
        document.getElementById('desc').textContent = "Ativando Chave API...";
      }
    }

    initClock();
    setInterval(updateTime, 1000);
    setInterval(updateWeather, 600000); 
    updateTime();
    updateWeather();
  </script>
</body>
</html>
