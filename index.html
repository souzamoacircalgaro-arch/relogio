<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Relógio Premium Original</title>
  <style>
    @import url("https://googleapis.com");

    body {
      margin: 0; padding: 0;
      display: grid; place-items: center;
      height: 100vh; width: 100vw;
      overflow: hidden;
      background: black; color: white;
      font-family: "Comfortaa", sans-serif;
    }

    .clock {
      --clock-size: 360px;
      width: var(--clock-size);
      height: var(--clock-size);
      position: relative;
    }

    /* Containers de rotação */
    .seconds, .minutes {
      position: absolute; inset: 0;
      transition: transform 0.3s ease-out;
    }

    .seconds { --dail-size: calc((var(--clock-size) / 2) - 8px); font-weight: 800; font-size: 16px; }
    .minutes { --dail-size: calc((var(--clock-size) / 2) - 65px); font-size: 16px; }

    .spike {
      position: absolute; width: 8px; height: 1px;
      background: rgba(255,255,255,0.3);
      inset: 0; margin: auto;
      transform: rotate(var(--rotate)) translateX(var(--dail-size));
    }

    /* Traço forte e Números */
    .spike:nth-child(5n + 1) { background: white; box-shadow: -7px 0 rgba(255,255,255,0.5); }
    .spike:nth-child(5n + 1):after {
      content: attr(data-i);
      position: absolute; right: 22px; top: -10px;
      transform: rotate(calc(var(--current-rotate) - var(--rotate)));
    }

    /* Hora Central */
    .hour {
      font-size: 80px; font-weight: 900;
      position: absolute;
      left: 45%; top: 50%; /* Leve ajuste para a esquerda */
      transform: translate(-50%, -50%);
      z-index: 5;
    }

    /* Minuto em Destaque */
    .minute-focus {
      z-index: 10;
      font-size: 38px; font-weight: 900;
      position: absolute;
      background: black; /* Isso esconde os números que passam atrás */
      left: 62%; top: 50%;
      transform: translate(-50%, -50%);
      padding: 5px 10px;
    }

    /* Moldura Verde */
    .minute-focus:after {
      content: "";
      position: absolute;
      border: 3px solid #29ff08;
      border-right: none;
      height: 55px; width: 140px;
      right: 0; top: 50%;
      border-radius: 40px 0 0 40px;
      transform: translateY(-50%);
      z-index: -1;
    }

    .weather {
      position: absolute; bottom: -80px;
      left: 50%; transform: translateX(-50%);
      text-align: center; width: 100%;
    }

    #temp { display: block; font-size: 26px; font-weight: 900; color: #29ff08; }
    #desc { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; }
  </style>
</head>
<body>

  <main class="clock">
    <div class="seconds"></div>
    <div class="minutes"></div>
    <div class="minute-focus">00</div>
    <div class="hour">00</div>

    <div class="weather">
      <span id="temp">--°C</span>
      <span id="desc">Sincronizando clima...</span>
    </div>
  </main>

  <script>
    const secondsEl = document.querySelector('.seconds');
    const minutesEl = document.querySelector('.minutes');
    const minText = document.querySelector('.minute-focus');
    const hourText = document.querySelector('.hour');

    const API_KEY = "a0d43926399b27cb538f5713317a90a6"; 
    const CITY = "Florianopolis";

    function init() {
      for (let s = 0; s < 60; s++) {
        const val = s.toString().padStart(2, '0');
        const deg = s * 6;
        const sSpike = document.createElement('i');
        const mSpike = document.createElement('i');
        sSpike.className = mSpike.className = 'spike';
        sSpike.style.setProperty('--rotate', `${deg}deg`);
        mSpike.style.setProperty('--rotate', `${deg}deg`);
        sSpike.setAttribute('data-i', val);
        mSpike.setAttribute('data-i', val);
        secondsEl.append(sSpike);
        minutesEl.append(mSpike);
      }
    }

    function update() {
      const now = new Date();
      const s = now.getSeconds(), m = now.getMinutes(), h = now.getHours();
      const sDeg = s * 6, mDeg = m * 6;

      secondsEl.style.transform = `rotate(-${sDeg}deg)`;
      minutesEl.style.transform = `rotate(-${mDeg}deg)`;
      secondsEl.style.setProperty('--current-rotate', `${sDeg}deg`);
      minutesEl.style.setProperty('--current-rotate', `${mDeg}deg`);

      hourText.textContent = h.toString().padStart(2, '0');
      minText.textContent = m.toString().padStart(2, '0');
    }

    async function updateWeather() {
      try {
        const res = await fetch(`https://openweathermap.org{CITY}&units=metric&lang=pt_br&appid=${API_KEY}`);
        const data = await res.json();
        if(data.main) {
          document.getElementById('temp').textContent = `${Math.round(data.main.temp)}°C`;
          document.getElementById('desc').textContent = data.weather[0].description;
        }
      } catch (err) {
        document.getElementById('desc').textContent = "Aguardando ativação API...";
      }
    }

    init();
    setInterval(update, 1000);
    setInterval(updateWeather, 600000);
    update();
    updateWeather();
  </script>
</body>
</html>
