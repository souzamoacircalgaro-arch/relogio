<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Relógio Moderno Original - Corrigido</title>
  <style>
    @import url("https://googleapis.com");

    body {
      margin: 0; padding: 0;
      display: grid; place-items: center;
      height: 100vh; width: 100vw;
      overflow: hidden;
      background: black; color: white;
      font-family: "Comfortaa", sans-serif;
    }

    .clock {
      --clock-size: 360px;
      width: var(--clock-size);
      height: var(--clock-size);
      position: relative;
    }

    .seconds, .minutes {
      position: absolute;
      inset: 0;
      transition: transform 0.2s ease-out;
      will-change: transform;
    }

    .seconds { 
      --dail-size: calc((var(--clock-size) / 2) - 8px); 
      font-weight: 800; font-size: 16px;
    }

    .minutes { 
      --dail-size: calc((var(--clock-size) / 2) - 65px); 
      font-size: 16px;
    }

    .spike {
      z-index: 5;
      position: absolute;
      width: 8px; height: 1px;
      background: #fff9;
      transform-origin: 50%;
      inset: 0; margin: auto;
      transform: rotate(var(--rotate)) translateX(var(--dail-size));
    }

    /* Traço mais forte a cada 5 unidades */
    .spike:nth-child(5n + 1) { box-shadow: -7px 0 #fff9; }

    /* Estilo dos números (data-i) */
    .spike:nth-child(5n + 1):after {
      content: attr(data-i);
      position: absolute;
      right: 22px; top: -10px;
      /* O segredo para o número não girar junto com o círculo */
      transform: rotate(calc(var(--current-rotate) - var(--rotate)));
    }

    .hour {
      font-size: 70px; font-weight: 900;
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
    }

    .minute {
      z-index: 10;
      font-size: 36px; font-weight: 900;
      position: absolute;
      background: black;
      right: calc(var(--clock-size) / 4.5);
      top: 50%;
      transform: translateY(-50%);
      padding: 0 5px;
    }

    .minute:after {
      content: "";
      position: absolute;
      border: 2px solid #29ff08;
      border-right: none;
      height: 50px; width: calc(var(--clock-size) / 2.75);
      left: -10px; top: 50%;
      border-radius: 40px 0 0 40px;
      transform: translateY(-50%);
    }
  </style>
</head>
<body>

  <main class="clock">
    <div class="seconds"></div>
    <div class="minutes"></div>
    <div class="minute">00</div>
    <div class="hour">00</div>
  </main>

  <script>
    const secondsEl = document.querySelector('.seconds');
    const minutesEl = document.querySelector('.minutes');
    const minuteText = document.querySelector('.minute');
    const hourText = document.querySelector('.hour');

    // Criar os 60 spikes (Exatamente como no seu código original)
    function init() {
      for (let s = 0; s < 60; s++) {
        const sSpike = document.createElement('i');
        const mSpike = document.createElement('i');
        sSpike.className = mSpike.className = 'spike';
        
        // Define a posição circular
        const deg = s * 6;
        sSpike.style.setProperty('--rotate', `${deg}deg`);
        mSpike.style.setProperty('--rotate', `${deg}deg`);
        
        // Adiciona o número (00, 01...)
        const val = s.toString().padStart(2, '0');
        sSpike.setAttribute('data-i', val);
        mSpike.setAttribute('data-i', val);

        secondsEl.append(sSpike);
        minutesEl.append(mSpike);
      }
    }

    function update() {
      const now = new Date();
      const s = now.getSeconds();
      const m = now.getMinutes();
      const h = now.getHours();

      const sDeg = s * 6;
      const mDeg = m * 6;

      // Gira o anel inteiro (negativo para os números virem até o marcador)
      secondsEl.style.transform = `rotate(-${sDeg}deg)`;
      minutesEl.style.transform = `rotate(-${mDeg}deg)`;

      // Passa a rotação atual para o CSS corrigir a posição dos números individuais
      secondsEl.style.setProperty('--current-rotate', `${sDeg}deg`);
      minutesEl.style.setProperty('--current-rotate', `${mDeg}deg`);

      // Atualiza o centro
      hourText.textContent = h.toString().padStart(2, '0');
      minuteText.textContent = m.toString().padStart(2, '0');
    }

    init();
    setInterval(update, 1000);
    update();
  </script>
</body>
</html>
