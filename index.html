<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relógio Moderno Final</title>
  <style>
    @import url("https://googleapis.com");

    body {
      margin: 0; padding: 0;
      display: grid; place-items: center;
      height: 100vh; width: 100vw;
      overflow: hidden;
      background: black; color: white;
      font-family: "Comfortaa", sans-serif;
    }

    .clock {
      --clock-size: 380px;
      width: var(--clock-size);
      height: var(--clock-size);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Containers de rotação */
    .seconds, .minutes {
      position: absolute;
      inset: 0;
      transition: transform 0.2s cubic-bezier(0.4, 2.08, 0.55, 0.44);
      will-change: transform;
    }

    .seconds { --dail-size: 175px; font-weight: 800; font-size: 16px; }
    .minutes { --dail-size: 125px; font-size: 16px; }

    .spike {
      position: absolute; width: 8px; height: 1px;
      background: rgba(255,255,255,0.2);
      inset: 0; margin: auto;
      transform: rotate(var(--rotate)) translateX(var(--dail-size));
    }

    .spike[data-i]:after {
      content: attr(data-i);
      position: absolute; right: 22px; top: -10px;
      /* O segredo para manter o número em pé */
      transform: rotate(calc(var(--current-rotate) * -1 - var(--rotate)));
      transition: transform 0.2s;
    }

    /* Centralização corrigida da Hora e Minuto */
    .time-center {
      display: flex;
      align-items: baseline;
      gap: 10px;
      z-index: 5;
      background: black;
      padding: 10px;
    }

    .hour { font-size: 80px; font-weight: 900; line-height: 1; }
    .minute-val { font-size: 30px; font-weight: 400; color: #29ff08; }

    /* Marcador Verde (Fixo na direita) */
    .minute-focus {
      z-index: 10;
      position: absolute;
      right: 15%; /* Ajustado para alinhar com os spikes */
      top: 50%;
      transform: translateY(-50%);
      width: 130px;
      height: 55px;
      border: 3px solid #29ff08;
      border-right: none;
      border-radius: 40px 0 0 40px;
      pointer-events: none;
    }

    .weather {
      position: absolute; bottom: -100px;
      text-align: center; width: 300px;
    }

    #temp { display: block; font-size: 28px; font-weight: 700; color: #29ff08; }
    #desc { font-size: 13px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; }
  </style>
</head>
<body>

  <main class="clock">
    <div class="rotor seconds"></div>
    <div class="rotor minutes"></div>
    
    <div class="time-center">
      <div class="hour">00</div>
      <div class="minute-val">00</div>
    </div>

    <div class="minute-focus"></div>

    <div class="weather">
      <span id="temp">--°C</span>
      <span id="desc">Sincronizando clima...</span>
    </div>
  </main>

  <script>
    const secRotor = document.querySelector('.seconds');
    const minRotor = document.querySelector('.minutes');
    const hourDisp = document.querySelector('.hour');
    const minDisp = document.querySelector('.minute-val');

    const API_KEY = "a0d43926399b27cb538f5713317a90a6"; 
    const CITY = "Florianopolis";

    function init() {
      for (let i = 0; i < 60; i++) {
        const val = i.toString().padStart(2, '0');
        const deg = i * 6;
        const sSpike = document.createElement('i');
        const mSpike = document.createElement('i');
        sSpike.className = mSpike.className = 'spike';
        sSpike.style.setProperty('--rotate', `${deg}deg`);
        
        if (i % 5 === 0) {
          sSpike.setAttribute('data-i', val);
          mSpike.setAttribute('data-i', val);
          sSpike.style.background = "white";
        }
        
        document.querySelector('.seconds').append(sSpike);
        document.querySelector('.minutes').append(mSpike);
      }
    }

    function update() {
      const now = new Date();
      const s = now.getSeconds(), m = now.getMinutes(), h = now.getHours();

      // Ajuste de 90 graus para o número atual parar na direita (marcador verde)
      const sDeg = (s * 6);
      const mDeg = (m * 6);

      // Giramos o container de forma que o valor atual fique nos 0 graus (direita)
      document.querySelector('.seconds').style.transform = `rotate(-${sDeg}deg)`;
      document.querySelector('.minutes').style.transform = `rotate(-${mDeg}deg)`;
      
      // Variável para o CSS desvirar o número
      document.querySelector('.seconds').style.setProperty('--current-rotate', `${sDeg}deg`);
      document.querySelector('.minutes').style.setProperty('--current-rotate', `${mDeg}deg`);

      hourDisp.textContent = h.toString().padStart(2, '0');
      minDisp.textContent = m.toString().padStart(2, '0');
    }

    async function updateWeather() {
      try {
        const url = `https://openweathermap.org{CITY}&units=metric&lang=pt_br&appid=${API_KEY}`;
        const res = await fetch(url);
        const data = await res.json();
        if(data.main) {
          document.getElementById('temp').textContent = `${Math.round(data.main.temp)}°C`;
          document.getElementById('desc').textContent = data.weather[0].description;
        }
      } catch (err) {
        document.getElementById('desc').textContent = "Aguardando API...";
      }
    }

    init();
    setInterval(update, 1000);
    setInterval(updateWeather, 600000);
    update();
    updateWeather();
  </script>
</body>
</html>
